  <meta name="keywords" content="醫院查詢, 機構總覽, 護病比, 職場資料, 勞檢, 違規紀錄, 護理職場" />

  <meta property="og:site_name" content="護理職場透明化運動" />
  <meta property="og:title" content="機構總覽 — 護理職場透明化運動" />
  <meta property="og:description" content="一家醫院的護病比、眾包職場資料與違規紀錄，整合成單一檔案。" />
  <meta property="og:image" content="https://transparentnursing.example.org/assets/og-image.svg" />

  <meta name="twitter:description" content="一家醫院的護病比、眾包職場資料與違規紀錄，整合成單一檔案。" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="modulepreload" href="./js/config.js?v=26" />
  <link rel="modulepreload" href="./js/components.js?v=26" />
  <link rel="modulepreload" href="./js/icons.js?v=26" />
  <link rel="modulepreload" href="./js/hospital.js?v=26" />
</head>
<body>
  <div id="app-header"></div>

  <section style="padding-top:48px;padding-bottom:16px;">
    <div class="container">
      <span class="eyebrow">Hospital Profile</span>
      <h1 style="margin:4px 0 8px;">機構總覽</h1>
      <p style="color:var(--muted);max-width:760px;line-height:1.75;">
        選一家評鑑醫院，一次看完它的<strong style="color:var(--ink);">三班護病比走勢</strong>、
        <strong style="color:var(--ink);">資料平台眾包職場資料</strong>與
        <strong style="color:var(--ink);">勞檢／性平／職安違規紀錄</strong>。
      </p>
      <p style="color:var(--muted-light);font-size:0.85rem;margin-top:10px;">
        涵蓋衛福部醫院評鑑合格名單之機構；違規紀錄以機構名稱對照表比對，僅呈現可對應到評鑑醫院者。
      </p>
    </div>
  </section>

  <!-- 醫院選擇區 -->
  <section style="padding:0 0 24px;">
    <div class="container">
      <div class="nurse-picker">
        <div class="nurse-picker-header">
          <div class="nurse-picker-title">選擇醫院</div>
          <div class="nurse-picker-count" id="hospital-count">—</div>
        </div>
        <div class="nurse-picker-controls">
          <input id="hospital-search" type="search" placeholder="搜尋醫院名稱、簡稱或機構代號..." class="nurse-picker-search" />
        </div>
        <div id="hospital-list" class="nurse-hospital-list"></div>
      </div>
    </div>
  </section>

  <!-- 機構檔案 -->
  <section style="padding:0 0 56px;">
    <div class="container">
      <div id="hospital-placeholder" class="card card-flat" style="text-align:center;padding:48px 24px;color:var(--muted);">
        <div style="font-size:2rem;margin-bottom:8px;">🏥</div>
        <div>從上方選擇一家醫院，查看整合檔案</div>
      </div>

      <div id="hospital-detail" hidden>
        <!-- 機構標頭 -->
        <div class="nurse-hosp-header">
          <div>
            <h2 id="hosp-name" style="margin:0 0 8px;">—</h2>
            <span id="hosp-city" class="nurse-city-badge" hidden>—</span>
            <span id="hosp-level" class="nurse-level-badge">—</span>
            <div id="hosp-code" style="color:var(--muted);font-size:0.85rem;margin-top:8px;">—</div>
          </div>
        </div>

        <!-- 護病比 -->
        <div class="chart-card" style="margin-top:24px;">
          <div class="chart-card-header"><div>
            <h3><span data-icon="activity" data-size="16" style="color:var(--primary);vertical-align:middle;"></span> 三班護病比</h3>
          </div></div>
          <div id="nr-section-empty" hidden style="padding:20px;color:var(--muted);">此機構無 VPN 三班護病比登錄資料。</div>
          <div id="nr-section-body"></div>
        </div>

        <!-- 資料平台眾包 -->
        <div class="chart-card" style="margin-top:24px;">
          <div class="chart-card-header"><div>
            <h3><span data-icon="users" data-size="16" style="color:var(--primary);vertical-align:middle;"></span> 資料平台・眾包職場資料</h3>
          </div></div>
          <div id="pf-section-empty" hidden style="padding:20px;color:var(--muted);">此機構目前尚無眾包職場資料，
            <a href="participate.html" style="color:var(--primary);text-decoration:underline;">歡迎填寫</a>。</div>
          <div id="pf-section-body"></div>
        </div>

        <!-- 違規紀錄 -->
        <div class="chart-card" style="margin-top:24px;">
          <div class="chart-card-header" style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;"><div>
            <h3><span data-icon="siren" data-size="16" style="color:var(--danger);vertical-align:middle;"></span> 違規紀錄（勞檢／性平／職安）</h3>
          </div><div id="vi-section-summary" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;"></div></div>
          <div id="vi-section-empty" hidden style="padding:20px;color:var(--muted);">查無此機構的違規紀錄。</div>
          <div id="vi-section-body" style="padding:4px 0;"></div>
        </div>
      </div>
    </div>
  </section>

  <div id="app-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js" defer></script>
  <script type="module">
    import { mountLayout } from './js/components.js?v=26';
    import { renderIcons } from './js/icons.js?v=26';
    import { initHospital } from './js/hospital.js?v=26';

    mountLayout();
    renderIcons();

    if (typeof Chart !== 'undefined') {
      initHospital();
    } else {
      window.addEventListener('load', () => initHospital());
    }
  </script>
</body>
</html>
