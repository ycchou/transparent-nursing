  <!-- 強制清除舊版 cache -->
  <script>
    (function() {
      try {
        var FV = 'v16', FLAG = '__nursing_force_' + FV;
        if (!localStorage.getItem(FLAG)) {
          Object.keys(localStorage).forEach(function(k) {
            if (k.indexOf('nursing_csv_') === 0 ||
                (k.indexOf('__nursing_force_') === 0 && k !== FLAG)) {
              localStorage.removeItem(k);
            }
          });
          localStorage.setItem(FLAG, String(Date.now()));
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div id="app-header"></div>

  <!-- Hero -->
  <section style="padding-top:48px;padding-bottom:24px;">
    <div class="container container-narrow">
      <span class="eyebrow">Participate / 洗腎室</span>
      <h1 style="margin:4px 0 12px;">洗腎室職場資料分享</h1>
      <p style="color:var(--muted);line-height:1.75;">
        以下資料將 <strong style="color:var(--ink);">匿名彙整</strong>，作為其他護理師求職與工作評估的真實參考。
        填寫時請以客觀事實為主，避免情緒性敘述。完成需約 5-8 分鐘。
      </p>
      <div class="dform-callout">
        <span data-icon="shield-check" data-size="18"></span>
        <span>本表單不會記錄你的 IP 或任何可識別資訊。</span>
      </div>
    </div>
  </section>

  <!-- Form -->
  <section style="padding-top:0;padding-bottom:64px;">
    <div class="container container-narrow">
      <div id="dform-draft-banner-host"></div>

      <form id="dform" class="dform" novalidate>
        <p class="dform-required-note-top">標 <span class="dform-required">*</span> 為必填</p>
        <div id="dform-fields"></div>

        <!-- 法律同意條款 — 3 個 checkbox 必須全勾才能送出 -->
        <div class="dform-consent-card" id="dform-consent-card">
          <div class="dform-consent-title">📝 送出前最後確認</div>
          <div class="dform-consent-hint">以下 3 項為投稿條件，請逐項閱讀並勾選；完整條款請參閱 <a href="terms.html" target="_blank" rel="noopener">服務條款</a>。</div>
          <ul class="dform-consent-list">
            <li>
              <label class="dform-consent-item">
                <input type="checkbox" id="consent-1" data-consent="1" />
                <span class="dform-consent-text">
                  <strong>①</strong> 我聲明所填內容皆為<strong>「親身經歷的真實情況」</strong>。
                </span>
              </label>
            </li>
            <li>
              <label class="dform-consent-item">
                <input type="checkbox" id="consent-2" data-consent="1" />
                <span class="dform-consent-text">
                  <strong>②</strong> 我已確認短評中<strong>未揭露任何能識別第三人</strong>（同事、主管、病人、家屬）的姓名，亦<strong>未填寫</strong>任何涉及<strong>病人病情、兒童及少年、性侵害被害人</strong>的可識別資訊。
                </span>
              </label>
            </li>
            <li>
              <label class="dform-consent-item">
                <input type="checkbox" id="consent-3" data-consent="1" />
                <span class="dform-consent-text">
                  <strong>③</strong> 我了解<strong>送出即公開、無法事後撤回</strong>特定單筆資料；若內容經查明違法、不實或經第三方合理檢舉時，<strong>平台有權逕予下架或修訂</strong>。
                </span>
              </label>
            </li>
          </ul>
          <div class="dform-error-msg" id="err-consent">請勾選全部 3 項條款後再送出</div>
        </div>

        <!-- 驗證碼（送出按鈕上方最後一關） -->
        <div class="dform-field dform-captcha-field" id="dform-captcha-field" data-name="captcha" data-required="1">
          <label class="dform-label" for="captcha-input">
            驗證碼<span class="dform-required" aria-hidden="true">*</span>
          </label>
          <div class="dform-help">輸入下方的英數字，不分大小寫</div>
          <div class="dform-captcha-row">
            <div id="captcha-display" class="dform-captcha-display" aria-label="驗證碼"></div>
            <button type="button" id="captcha-refresh" class="dform-captcha-refresh" aria-label="重新產生驗證碼" title="重新產生">↻</button>
            <input type="text" id="captcha-input" class="dform-input dform-captcha-input"
                   maxlength="6" autocomplete="off" inputmode="text"
                   placeholder="輸入左方 6 碼" />
          </div>
          <div class="dform-error-msg" id="err-captcha">驗證碼錯誤，請重新輸入</div>
        </div>

        <div class="dform-submit-bar">
          <button type="submit" class="btn btn-primary dform-submit-btn">
            <span>送出表單</span>
            <span data-icon="arrow-right" data-size="14"></span>
          </button>
        </div>
      </form>

      <div id="dform-thanks" hidden></div>
    </div>
  </section>

  <div id="app-footer"></div>

  <script type="module" src="./js/form-dialysis.js?v=e15fb4d31d"></script>
