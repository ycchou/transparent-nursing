  <!-- 強制清除舊版 cache -->
  <script>
    (function() {
      try {
        var FV = 'v16', FLAG = '__nursing_force_' + FV;
        if (!localStorage.getItem(FLAG)) {
          Object.keys(localStorage).forEach(function(k) {
            if (k.indexOf('nursing_csv_') === 0 ||
                (k.indexOf('__nursing_force_') === 0 && k !== FLAG)) {
              localStorage.removeItem(k);
            }
          });
          localStorage.setItem(FLAG, String(Date.now()));
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div id="app-header"></div>

  <section style="padding-top:48px;padding-bottom:24px;">
    <div class="container">
      <span class="eyebrow">Platform</span>
      <h1 style="margin:4px 0 8px;">分享平台</h1>
      <p style="color:var(--muted);max-width:680px;">
        瀏覽社群分享的職場資料。資料皆匿名彙整、未經編輯，僅作為求職與工作評估的參考。
      </p>
    </div>
  </section>

  <!-- Tabs -->
  <section style="padding:0 0 16px;">
    <div class="container">
      <div class="tabs" id="category-tabs"></div>
    </div>
  </section>

  <!-- KPI strip：依目前篩選即時計算的百分位數摘要 -->
  <section style="padding:0 0 16px;">
    <div class="container">
      <div id="kpi-strip"></div>
    </div>
  </section>

  <!-- 薪資百分位試算入口（取代右下角隱形浮動氣泡） -->
  <section style="padding:0 0 20px;">
    <div class="container">
      <button type="button" id="calc-trigger" class="calc-trigger-card">
        <span class="calc-trigger-icon" aria-hidden="true">🧮</span>
        <div class="calc-trigger-body">
          <div class="calc-trigger-title">試算你的年薪在這群人中排第幾百分位</div>
          <div class="calc-trigger-sub">基於目前篩選的資料即時計算，可生成匿名分享圖</div>
        </div>
        <span class="calc-trigger-arrow" aria-hidden="true">→</span>
      </button>
    </div>
  </section>

  <!-- 篩選條件：頂部折疊面板（仿 stats.html 樣式），預設收起來 -->
  <section style="padding:0 0 16px;">
    <div class="container">
      <details class="filter-panel stat-filter-panel" id="platform-filter-details">
        <summary>
          <span class="stat-filter-title">
            <span data-icon="filter" data-size="16" style="color:var(--primary);"></span>
            <span>篩選條件</span>
            <span class="stat-filter-badge" id="stat-filter-badge" hidden>已套用</span>
          </span>
          <span class="stat-filter-chev" aria-hidden="true">
            <span data-icon="chevron-down" data-size="18"></span>
          </span>
        </summary>
        <div class="stat-filter-body">
          <div id="filter-panel"></div>
        </div>
      </details>
    </div>
  </section>

  <!-- 結果表格 -->
  <section style="padding:0 0 16px;">
    <div class="container">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px;flex-wrap:wrap;">
        <div style="color:var(--muted);font-size:0.92rem;" id="result-count">載入中...</div>
        <div class="view-switch" id="view-switch">
          <button data-view="table" class="active">表格</button>
          <button data-view="card">卡片</button>
        </div>
      </div>
      <div id="table-container"></div>
    </div>
  </section>

  <!-- CTA 倒流：分享 + 諮詢 兩張卡並排 -->
  <section style="padding:0 0 56px;">
    <div class="container">
      <div class="platform-cta-row">
        <a href="participate.html" class="platform-cta-card">
          <div class="platform-cta-icon">
            <span data-icon="heart" data-size="28"></span>
          </div>
          <div class="platform-cta-body">
            <h3>看完別人的分享了嗎？輪到你了</h3>
            <p>5 分鐘為下一位徬徨的求職護理師留下真實的指引。<strong>完全匿名、不收集任何個人資料。</strong></p>
          </div>
          <div class="platform-cta-action">
            <span class="btn btn-primary">
              分享我的職場 <span data-icon="arrow-right" data-size="14"></span>

        </a>
        <a href="https://www.facebook.com/tnu.org?locale=zh_TW" target="_blank" rel="noopener" class="platform-cta-card platform-cta-card-consult">
          <div class="platform-cta-icon">
            <span data-icon="scale" data-size="28"></span>
          </div>
          <div class="platform-cta-body">
            <h3>遇到勞資爭議？臺護產可諮詢</h3>
            <p>看完資料覺得自己職場條件異常？<strong>臺灣護理產業工會</strong>提供工會諮詢與勞動權益協助，歡迎透過 FB 粉專留言聯絡。</p>
          </div>

            <span class="btn btn-secondary">

  <div id="app-footer"></div>

  <style>
    @media (max-width: 768px) {
      #table-container .table-view { display: none !important; }
      #table-container .card-view  { display: block !important; }
      #view-switch { display: none; }

  <!-- PapaParse 必須先載（CSV 解析）；html2canvas 改為點「產生分享圖」時 lazy load -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js" defer></script>
  <script type="module">
    import { CATEGORIES } from './js/config.js?v=8f9cf82f88';
    import { mountLayout } from './js/components.js?v=8f9cf82f88';
    import { icon, renderIcons } from './js/icons.js?v=8f9cf82f88';
    import { loadCategory, loadAll, startAutoRefresh } from './js/data-loader.js?v=8f9cf82f88';
    import { renderTable, setView, showDetailModal } from './js/table.js?v=8f9cf82f88';
    import { createFilterState, renderFilters, applyFilters } from './js/filters.js?v=8f9cf82f88';
    import { renderKpiStrip, mountSalaryCalculator } from './js/stats-kpi.js?v=8f9cf82f88';
    import { getGate } from './js/contribution-gate.js?v=8f9cf82f88';
    import { showToast } from './js/toast.js?v=8f9cf82f88';

    mountLayout();

    // ===== Deep-link & toast helpers =====
    function parseDeepLinkId() {
      const raw = new URL(location.href).searchParams.get('id');
      if (!raw) return null;
      const n = Number(raw);
      return Number.isFinite(n) && n > 0 ? n : null;
    }
    function setDeepLinkUrl(id, replace = false) {
      const u = new URL(location.href);
      if (id == null) u.searchParams.delete('id');
      else u.searchParams.set('id', String(id));
      const fn = replace ? 'replaceState' : 'pushState';
      history[fn]({ id: id ?? null }, '', u.toString());
    }
    function openModalForRow(row) {
      showDetailModal(row, {
        onClose: () => setDeepLinkUrl(null, true),
      });
    }

    // State
    const initialSlug = (location.hash || '').replace('#', '') || 'all';
    const state = {
      slug: initialSlug,
      filterState: createFilterState(),
      allData: [], // per-slug 或 all
      counts: {},
      pendingDeepLinkId: parseDeepLinkId(),
    };

    // Tabs
    const tabsEl = document.getElementById('category-tabs');
    function renderTabs() {
      const items = [{ slug: 'all', name: '全部', icon: 'layout' }, ...CATEGORIES];
      tabsEl.innerHTML = items.map((it) => `
        <button class="tab ${state.slug === it.slug ? 'active' : ''}" data-slug="${it.slug}">
          ${icon(it.icon, { size: 16 })}
          <span>${it.name}</span>
          <span class="badge">${state.counts[it.slug] != null ? state.counts[it.slug] : '·'}</span>
        </button>
      `).join('');
      tabsEl.querySelectorAll('.tab').forEach((btn) => {
        btn.addEventListener('click', () => {
          state.slug = btn.dataset.slug;
          location.hash = state.slug === 'all' ? '' : state.slug;
          loadAndRender();
        });
      });
    }

    // Filters：折疊面板（仿 stats.html），預設收起
    const filterEl = document.getElementById('filter-panel');
    const filterDetails = document.getElementById('platform-filter-details');
    const filterBadge = document.getElementById('stat-filter-badge');
    renderFilters(filterEl, state.filterState, () => { refreshTable(); updateFilterCount(); });

    function updateFilterCount() {
      const s = state.filterState;
      const n = (s.q ? 1 : 0) + (s.location ? s.location.size : 0)
              + s.institutionType.size + s.weeklyHours.size
              + s.overtimePolicy.size + s.recommendIndex.size;
      if (filterBadge) {
        filterBadge.hidden = n === 0;
        filterBadge.textContent = n === 0 ? '已套用' : `已套用 ${n} 項`;
      }
    }
    updateFilterCount();
    // 渲染 details summary 內的 icon
    renderIcons(filterDetails);
    // 處理 CTA 區段內的 data-icon 占位符
    renderIcons(document.querySelector('.platform-cta-card'));

    // Table container
    const tableContainer = document.getElementById('table-container');
    tableContainer.dataset.view = 'table';

    // KPI 條 + 浮動氣泡試算工具：mount 一次，calc 透過 closure 讀取最新篩選結果
    const kpiEl = document.getElementById('kpi-strip');
    let currentFiltered = [];

    // 把當前篩選狀態翻譯成「比較條件」陣列，計算結果會顯示
    const RECOMMEND_LABELS = { 5: '非常推薦', 4: '推薦', 3: '保留', 2: '不推薦', 1: '非常不推薦' };
    function describeCurrentConditions() {
      const out = [];
      // 類別（tab）
      if (state.slug !== 'all') {
        const cat = CATEGORIES.find((c) => c.slug === state.slug);
        if (cat) out.push({ label: '類別', value: cat.name });
      }
      const f = state.filterState;
      if (f.institutionType.size) out.push({ label: '機構', value: Array.from(f.institutionType).join('、') });
      if (f.location && f.location.size) out.push({ label: '地點', value: Array.from(f.location).join('、') });
      if (f.weeklyHours.size) out.push({ label: '工時', value: Array.from(f.weeklyHours).join('、') + ' 小時' });
      if (f.overtimePolicy.size) out.push({ label: '加班費', value: Array.from(f.overtimePolicy).join('、') });
      if (f.recommendIndex.size) {
        out.push({ label: '推薦', value: Array.from(f.recommendIndex).map((v) => RECOMMEND_LABELS[v] || v).join('、') });
      }
      if (f.q) out.push({ label: '關鍵字', value: f.q });
      return out;
    }

    const calc = mountSalaryCalculator(() => currentFiltered, describeCurrentConditions);
    const calcTrigger = document.getElementById('calc-trigger');
    if (calcTrigger) calcTrigger.addEventListener('click', () => calc.open());

    // View switch
    document.querySelectorAll('#view-switch button').forEach((btn) => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#view-switch button').forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        setView(tableContainer, btn.dataset.view);
      });
    });

    async function loadAndRender() {
      renderTabs();
      // Skeleton
      tableContainer.innerHTML = `
        <div class="data-table-wrap" style="padding:24px;">
          ${Array.from({length:6}).map(() =>
            `<div class="skeleton" style="height:36px;margin-bottom:8px;"></div>`
          ).join('')}
        </div>`;
      document.getElementById('result-count').textContent = '載入中...';

      try {
        // 若有 pending deep-link，先決定該筆所屬類別，必要時切 tab
        if (state.pendingDeepLinkId) {
          const allFirst = await loadAll();
          const target = allFirst.find((r) => r._seq === state.pendingDeepLinkId);
          if (target && state.slug !== 'all' && state.slug !== target._category) {
            state.slug = target._category;
          }
        }

        if (state.slug === 'all') {
          state.allData = await loadAll();
        } else {
          state.allData = await loadCategory(state.slug);
        }

        // 計算 counts（一次性 fetch 全部來算 badge）
        const all = await loadAll();
        const counts = { all: all.length };
        CATEGORIES.forEach((c) => { counts[c.slug] = all.filter((r) => r._category === c.slug).length; });
        state.counts = counts;
        renderTabs();
        refreshTable();

        // 醫院對照表載完後重繪一次，讓評鑑醫院名稱變成機構總覽連結
        window.addEventListener('hospitalShortNamesReady', () => {
          if (state.allData && state.allData.length) refreshTable();
        }, { once: true });

        // 處理 pending deep-link：找到對應 row → 開 modal
        if (state.pendingDeepLinkId) {
          const id = state.pendingDeepLinkId;
          state.pendingDeepLinkId = null; // 一次性
          const target = all.find((r) => r._seq === id);
          if (target) {
            openModalForRow(target);
          } else {
            showToast(`找不到 #${id} 這筆資料`, 'warn');
            setDeepLinkUrl(null, true);
          }
        }
      } catch (e) {
        console.error(e);
        tableContainer.innerHTML = `<div class="card" style="text-align:center;color:var(--danger);">資料載入失敗：${e.message}</div>`;
      }
    }

    function refreshTable() {
      const filtered = applyFilters(state.allData, state.filterState);
      currentFiltered = filtered;
      renderKpiStrip(kpiEl, filtered);

      const gate = getGate(state.filterState, state.slug);
      const willGate = gate.gated && filtered.length > gate.limit;
      const shown = willGate ? gate.limit : filtered.length;
      document.getElementById('result-count').textContent = willGate
        ? `顯示前 ${shown} 筆 · 共 ${filtered.length} 筆${gate.isFilteredView ? '（已套用篩選）' : ''}`
        : `共 ${filtered.length} 筆${state.allData.length !== filtered.length ? `（已套用篩選 / 全部 ${state.allData.length} 筆）` : ''}`;

      renderTable(tableContainer, filtered, {
        slug: state.slug,
        gate,
        onRowClick: (row) => {
          if (row._seq != null) setDeepLinkUrl(row._seq);
          openModalForRow(row);
        },
      });
    }

    // 處理上一頁/下一頁：URL 變化時開關 modal
    window.addEventListener('popstate', async () => {
      const id = parseDeepLinkId();
      const modal = document.getElementById('detail-modal');
      if (id) {
        // 有 ?id= → 開該筆 modal
        try {
          const all = await loadAll();
          const target = all.find((r) => r._seq === id);
          if (target) openModalForRow(target);
        } catch (e) { console.error(e); }
      } else if (modal && modal.classList.contains('open')) {
        // 沒 id 但 modal 還開著 → 關掉（不再 push history）
        modal.classList.remove('open');
      }
    });

    loadAndRender();

    // 每 10 分鐘背景靜默刷新 — 只更新 cache、不重畫當前畫面，下次造訪才換新版
    startAutoRefresh();
  </script>
</body>
