  <meta name="keywords" content="醫院財務, 醫務利益率, 整體獲利, 醫務收入, 護病比, 健保署, 醫院財報" />

  <meta property="og:site_name" content="護理職場透明化運動" />

  <meta property="og:description" content="健保署醫院財務資訊公開：整體獲利/虧損、醫務利益率、醫務收入，含全國排名與逐年趨勢。" />
  <meta property="og:image" content="https://transparentnursing.example.org/assets/og-image.svg" />

  <meta name="twitter:title" content="醫院財務 — 護理職場透明化運動" />
  <meta name="twitter:description" content="健保署醫院財務資訊公開：獲利/虧損、醫務利益率、醫務收入，含排名與趨勢。" />
  <meta name="twitter:image" content="https://transparentnursing.example.org/assets/og-image.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link rel="stylesheet" href="css/styles.css?v=26" />

  <link rel="modulepreload" href="./js/components.js?v=26" />
  <link rel="modulepreload" href="./js/icons.js?v=26" />
  <link rel="modulepreload" href="./js/financials.js?v=26" />
</head>
<body>
  <div id="app-header"></div>

  <section style="padding-top:48px;padding-bottom:16px;">
    <div class="container">
      <span class="eyebrow">Hospital Financials</span>
      <h1 style="margin:4px 0 8px;">醫院財務</h1>
      <p style="color:var(--muted);max-width:820px;line-height:1.75;">
        以醫院為單位呈現<strong style="color:var(--ink);">整體獲利/虧損、醫務利益率、醫務收入</strong>與
        <strong style="color:var(--ink);">全日平均護病比</strong>，含全國排名與逐年趨勢。點任一列可看該院多年變化。
      </p>
      <p style="color:var(--muted-light);font-size:0.85rem;margin-top:10px;line-height:1.7;">
        資料來源：<a href="https://med.nhi.gov.tw/rgfe0000/RGFE0030S01.aspx" target="_blank" rel="noopener" style="color:var(--primary);text-decoration:underline;">衛生福利部・健保署「醫院財務資訊公開」</a>
        （民國 104–112 年，金額單位：億元；僅涵蓋依法須公開財務之醫院）
      </p>
    </div>
  </section>

  <!-- 控制列 -->
  <section style="padding:0 0 20px;">
    <div class="container">
      <div class="nurse-picker">
        <div class="nurse-picker-header">
          <div class="nurse-picker-title">全院財務比較</div>
          <div class="nurse-picker-count" id="fin-count">—</div>
        </div>
        <div class="nurse-picker-controls">
          <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:center;">
            <label style="display:flex;align-items:center;gap:8px;">
              <span class="nurse-filter-label">年度：</span>
              <select id="fin-year" class="nurse-picker-search" style="width:auto;min-width:120px;"></select>
            </label>
            <input id="fin-search" type="search" placeholder="搜尋醫院名稱、簡稱或代號..." class="nurse-picker-search" style="flex:1;min-width:220px;" />
          </div>
          <div class="nurse-picker-filter-row">
            <span class="nurse-filter-label">層級：</span>
            <div class="nurse-picker-filters" id="fin-level-filter"></div>
          </div>
        </div>
        <div id="fin-table" class="fin-table-mount"></div>
        <p style="color:var(--muted-light);font-size:0.8rem;margin:10px 4px 0;">點欄位標題可排序；點醫院列看該院逐年趨勢。</p>
      </div>
    </div>
  </section>

  <!-- 單院明細 -->
  <section style="padding:0 0 56px;">
    <div class="container">
      <div id="fin-detail-placeholder" class="card card-flat" style="text-align:center;padding:40px 24px;color:var(--muted);">
        <div style="font-size:2rem;margin-bottom:8px;">📈</div>
        <div>點上方任一家醫院，查看其逐年財務趨勢與各年度明細</div>
      </div>

      <div id="fin-detail" hidden>
        <div class="nurse-hosp-header">
          <div>
            <h2 id="fin-detail-name" style="margin:0 0 8px;">—</h2>
            <div id="fin-detail-meta"></div>
          </div>
        </div>

        <div id="fin-detail-kpi" style="margin-top:16px;"></div>

        <div class="chart-card" style="margin-top:20px;">
          <div class="chart-card-header"><div><h3>逐年財務趨勢（醫務本業／非醫務／整體，單位：億元）</h3></div></div>
          <div class="chart-canvas-wrap" style="height:380px;">
            <canvas id="fin-chart"></canvas>
          </div>
        </div>

        <div class="chart-card" style="margin-top:20px;">
          <div class="chart-card-header"><div><h3>各年度明細</h3></div></div>
          <div id="fin-year-table"></div>
        </div>
      </div>
    </div>
  </section>

  <div id="app-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js" defer></script>
  <script type="module">
    import { mountLayout } from './js/components.js?v=26';
    import { renderIcons } from './js/icons.js?v=26';
    import { initFinancials } from './js/financials.js?v=26';

    mountLayout();
    renderIcons();

    if (typeof Chart !== 'undefined') initFinancials();
    else window.addEventListener('load', () => initFinancials());
  </script>
</body>
</html>
